name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install root dependencies (if present)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No root package-lock.json found; skipping root npm ci"
          fi

      - name: Build (root if present; otherwise build server+client)
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No root build script found; falling back to per-project builds"
            npm ci --prefix server
            npm test --prefix server
            npm run build --prefix server
            npm ci --prefix client
            npm run build --prefix client
          fi

      - name: Test server
        run: npm test --prefix server
