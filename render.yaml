services:
  - type: web
    name: coinpulse-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: coinpulse-redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: coinpulse-analyzer
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm --prefix server run analyze
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: coinpulse-redis
          type: keyvalue
          property: connectionString

  - type: cron
    name: coinpulse-collector
    runtime: node
    schedule: "*/10 * * * *"
    buildCommand: npm ci && npm run build
    startCommand: npm --prefix server run collect
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        fromService:
          name: coinpulse-redis
          type: keyvalue
          property: connectionString

  - type: keyvalue
    name: coinpulse-redis
    plan: free
    ipAllowList: []
